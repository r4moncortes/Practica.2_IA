version: "3.9"
 
services:
  # ── Servicio de tests (sin GUI) ───────────────────────────────────────────
  tests:
    build: .
    container_name: practica2_tests
    volumes:
      - .:/app
    command: python3 -m pytest tests/ -v --tb=short --cov=src --cov-report=term-missing
 
  # ── Servicio con GUI (requiere X11 en el host) ────────────────────────────
  app:
    build: .
    container_name: practica2_app
    environment:
      - DISPLAY=${DISPLAY:-:0}
    volumes:
      - .:/app
      - /tmp/.X11-unix:/tmp/.X11-unix   # socket X11 del host
    network_mode: host
    command: python3 main.py
    profiles:
      - gui     # solo se levanta con: docker compose --profile gui up app
 